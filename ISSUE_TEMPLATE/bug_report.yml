name: Bug report
description: Report a bug in VitaeFlow
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you expected and what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Install @vitaeflow/sdk
        2. Call embedResume(...)
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package and version
      description: "Output of `npm list @vitaeflow/sdk` or `vitaeflow --version`."
      placeholder: "@vitaeflow/sdk@0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Output of `node -v`."
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Node.js
        - Browser
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
